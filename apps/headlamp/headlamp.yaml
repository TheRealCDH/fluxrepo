apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      version: ">=0.21.0"
  install:
    createNamespace: true
  interval: 1h
  values:
    config:
      watchPlugins: true
    service:
      type: LoadBalancer
      port: 80
      targetPort: 4466
      annotations:
        metallb.io/loadBalancerIPs: 192.168.2.240
    # The Headlamp chart doesn't have a direct "sidecars" value, 
    # so we will use a Kustomize patch in this directory.
