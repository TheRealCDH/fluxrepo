apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: ">=0.21.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    createNamespace: true
  values:
    service:
      type: NodePort
      port: 80
      nodePort: 30010
    config:
      watchPlugins: true
    volumes:
      - name: plugins-dir
        emptyDir: {}
    volumeMounts:
      - name: plugins-dir
        mountPath: /headlamp/plugins
    initContainers:
      - name: install-kubevirt
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p /headlamp/plugins/kubevirt
            wget -qO- https://github.com/naval-group/headlamp-kubevirt/releases/download/v0.2.1/headlamp-kubevirt-0.2.1.tar.gz | tar -xz -C /headlamp/plugins/kubevirt --strip-components=1
        volumeMounts:
          - name: plugins-dir
            mountPath: /headlamp/plugins
    pluginsManager:
      enabled: false
