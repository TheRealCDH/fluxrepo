apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubevirt
  namespace: flux-system
spec:
  interval: 1m
  chart:
    spec:
      chart: kubevirt
      version: '>=1.0.0'
      sourceRef:
        kind: HelmRepository
        name: kubevirt
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    configuration:
      developerConfiguration:
        useEmulation: true
