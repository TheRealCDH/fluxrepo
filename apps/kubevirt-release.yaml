apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kubevirt
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: kubevirt
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: kubevirt
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Add any custom KubeVirt values here
    configuration:
      developerConfiguration:
        useEmulation: true # Useful for testing if nesting is not available
