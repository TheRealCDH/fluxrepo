apiVersion: v1
kind: Namespace
metadata:
  name: nfs-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: erichough/nfs-server
        securityContext:
          privileged: true
        env:
        - name: NFS_EXPORT_0
          value: "/nfs-share *(rw,sync,no_subtree_check,fsid=0,crossmnt)"
        - name: NFS_EXPORT_1
          value: "/nfs-share/exports/Plex *(rw,sync,no_subtree_check,insecure,no_root_squash)"
        volumeMounts:
        - name: nfs-share
          mountPath: /nfs-share
        - name: plex-data
          mountPath: /nfs-share/exports/Plex
      initContainers:
      - name: setup
        image: busybox
        command: ["sh", "-c", "mkdir -p /nfs-share/exports/Plex"]
        volumeMounts:
        - name: nfs-share
          mountPath: /nfs-share
      volumes:
      - name: nfs-share
        emptyDir: {}
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: nfs-server
  annotations:
    tailscale.com/proxy-group: nfs-proxy
spec:

  selector:
    app: nfs-server
  ports:
  - name: nfs
    port: 2049
    protocol: TCP
    targetPort: 2049
  - name: mountd
    port: 20048
    protocol: TCP
    targetPort: 20048
  - name: rpcbind
    port: 111
    protocol: TCP
    targetPort: 111
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: nfs-proxy
  namespace: nfs-server
spec:
  type: ingress
  hostnamePrefix: nfs-server
  tags: ["tag:k8s-operator"]
