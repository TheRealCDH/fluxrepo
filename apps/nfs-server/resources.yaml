apiVersion: v1
kind: Namespace
metadata:
  name: nfs-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: erichough/nfs-server
        securityContext:
          privileged: true
        env:
        - name: NFS_EXPORT_0
          value: "/exports/Plex *(rw,sync,no_subtree_check,insecure,no_root_squash,fsid=1)"
        volumeMounts:
        - name: plex-data
          mountPath: /exports/Plex
        command: ["sh", "-c"]
        args:
          - |
            # Start rpcbind
            /sbin/rpcbind -w
            
            # Create exports file
            echo "/exports/Plex *(rw,sync,no_subtree_check,insecure,no_root_squash,fsid=1)" > /etc/exports
            
            # Start mountd
            /usr/sbin/rpc.mountd --port 32767 --nfs-version 4.2
            
            # Export everything
            /usr/sbin/exportfs -v -a
            
            # Start nfsd threads and keep them alive
            while true; do
              if [ $(cat /proc/fs/nfsd/threads 2>/dev/null || echo 0) -eq 0 ]; then
                echo "Starting nfsd..."
                /usr/sbin/rpc.nfsd 8
              fi
              sleep 10
            done
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
