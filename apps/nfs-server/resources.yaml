apiVersion: v1
kind: Namespace
metadata:
  name: nfs-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      initContainers:
      - name: setup
        image: busybox
        command: ["sh", "-c", "mkdir -p /nfs-share/exports/Plex"]
        volumeMounts:
        - name: nfs-root
          mountPath: /nfs-share
      containers:
      - name: nfs-server
        image: erichough/nfs-server
        securityContext:
          privileged: true
        env:
        - name: NFS_EXPORT_0
          value: "/nfs-share *(rw,sync,no_subtree_check,fsid=0,crossmnt,insecure,no_root_squash)"
        - name: NFS_EXPORT_1
          value: "/nfs-share/exports/Plex *(rw,sync,no_subtree_check,insecure,no_root_squash)"
        volumeMounts:
        - name: nfs-root
          mountPath: /nfs-share
        - name: plex-data
          mountPath: /nfs-share/exports/Plex
        command: ["sh", "-c", "/usr/local/bin/entrypoint.sh & sleep 5 && while true; do if [ $(cat /proc/fs/nfsd/threads) -eq 0 ]; then echo 'Kicking nfsd threads...'; /usr/sbin/rpc.nfsd 8; fi; sleep 10; done"]
      volumes:
      - name: nfs-root
        emptyDir: {}
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: nfs-server
spec:
  selector:
    app: nfs-server
  ports:
  - name: nfs
    port: 2049
    protocol: TCP
    targetPort: 2049
  - name: mountd
    port: 20048
    protocol: TCP
    targetPort: 20048
  - name: rpcbind
    port: 111
    protocol: TCP
    targetPort: 111
