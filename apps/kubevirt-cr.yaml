apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt-instance
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevirt-operator
  interval: 1h
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  resources:
    - https://github.com/kubevirt/kubevirt/releases/download/v1.4.0/kubevirt-cr.yaml
