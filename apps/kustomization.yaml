resources:
  # 1. Sync Logic (Folder pointers)
  - sync-manifests.yaml

  # 2. Standalone Manifests
  - headlamp/

patches:
  - target:
      kind: Kustomization
      name: second-sync
      namespace: flux-system
    patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: second-sync
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: headlamp
            patch: |
              $patch: delete
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: headlamp
