apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: default-bridge
  namespace: default
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "default-bridge",
      "type": "bridge",
      "bridge": "br0",
      "isGateway": true,
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.0.0/24",
        "routes": [
          { "dst": "0.0.0.0/0" }
        ]
      }
    }'
