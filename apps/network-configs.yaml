apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: masquerade-nic
  namespace: default
  labels:
    kubevirt.io/type: masquerade
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "masquerade-nic",
      "plugins": [
        {
          "type": "ptp",
          "ipam": {
            "type": "host-local",
            "subnet": "10.1.1.0/24"
          }
        }
      ]
    }'
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: bridge-nic
  namespace: default
  labels:
    kubevirt.io/type: bridge
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "bridge-nic",
      "type": "bridge",
      "bridge": "virbr0",
      "isGateway": true
    }'
