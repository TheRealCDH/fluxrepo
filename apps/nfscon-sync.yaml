apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nfscon
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/TheRealCDH/nfscon
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nfscon
  namespace: flux-system
spec:
  interval: 10m
  path: ./
  prune: true
  sourceRef:
    kind: GitRepository
    name: nfscon
